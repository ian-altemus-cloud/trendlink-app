replicaCount: 1

image:
  repository: 307217365914.dkr.ecr.us-east-1.amazonaws.com/trendlink-app
  tag: 2bb12a3c304862b5b99ad7ae882c49c1843e1706
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetport: 8080

ingress:
  enabled: true
  host: trendlink.local
  path: /prospects

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

env:
  AWS_REGION: us-east-1
  DYNAMODB_TABLE: trendlink-prospects

vault:
  role: tl-prospect-agent
  googlePlacesSecret: secret/data/trendlink/google-places-api-key
  awsSecret: secret/data/trendlink/aws-credentials